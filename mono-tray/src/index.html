<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mono Tray</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Disconnected overlay -->
    <div id="disconnect-overlay" class="hidden">
      <div class="disconnect-content">
        <div class="disconnect-icon">⚡</div>
        <div class="disconnect-text">Disconnected</div>
        <div class="disconnect-sub">Reconnecting...</div>
      </div>
    </div>

    <!-- Navigation header -->
    <div id="nav-header">
      <button id="nav-back" class="nav-btn hidden" title="Back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
        </svg>
      </button>
      <span id="nav-title"></span>
      <button id="nav-action" class="nav-btn" title="Library">
        <svg id="icon-list" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
        </svg>
        <svg id="icon-play-all" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="hidden">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg id="icon-clear" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="hidden">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>

    <!-- Breadcrumbs -->
    <div id="breadcrumbs"></div>

    <!-- Sliding view container -->
    <div id="view-container" data-view="now-playing">

      <!-- View 1: Now Playing -->
      <div id="view-now-playing" class="view-panel">
        <!-- Album art -->
        <div id="art-container">
          <img id="album-art" src="" alt="" />
          <div id="art-placeholder">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 18V5l12-2v13"/>
              <circle cx="6" cy="18" r="3"/>
              <circle cx="18" cy="16" r="3"/>
            </svg>
          </div>
        </div>

        <!-- Track info -->
        <div id="track-info">
          <div id="title">Not Playing</div>
          <div id="artist-album"></div>
        </div>

        <!-- Progress bar -->
        <div id="progress-container">
          <canvas id="waveform-canvas" width="320" height="24"></canvas>
          <div id="progress-bar">
            <div id="progress-fill"></div>
            <div id="progress-thumb"></div>
          </div>
          <div id="time-display">
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
          </div>
        </div>

        <!-- Transport controls -->
        <div id="controls">
          <button id="btn-previous" class="control-btn" title="Previous">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
            </svg>
          </button>
          <button id="btn-play-pause" class="control-btn primary" title="Play/Pause">
            <svg id="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg id="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" class="hidden">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </button>
          <button id="btn-next" class="control-btn" title="Next">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
            </svg>
          </button>
        </div>

        <!-- Volume slider -->
        <div id="volume-container">
          <svg id="volume-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
          </svg>
          <input type="range" id="volume-slider" min="0" max="100" value="100" />
        </div>

        <!-- Footer -->
        <div id="footer">
          <button id="queue-btn" type="button" title="View queue">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
              <path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/>
            </svg>
            <span id="queue-info"></span>
          </button>
          <button id="like-btn" class="hidden" title="Like">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
          <button id="np-download-btn" class="hidden" title="Download">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
          </button>
          <button id="history-btn" title="History">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
              <path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
            </svg>
          </button>
          <a id="open-link" href="#" title="Open on Monochrome">
            Open on Monochrome ↗
          </a>
        </div>
      </div>

      <!-- View 2: Browse / Search -->
      <div id="view-browse" class="view-panel">
        <div id="search-container">
          <input type="text" id="search-input" placeholder="Search tracks..." autocomplete="off" spellcheck="false" />
          <button id="sparkle-btn" class="nav-btn" title="AI Research">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2L9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61z"/>
            </svg>
            <span id="sparkle-badge" class="hidden"></span>
          </button>
        </div>
        <div id="search-tabs" class="hidden">
          <button class="search-tab active" data-kind="tracks">Tracks</button>
          <button class="search-tab" data-kind="albums">Albums</button>
          <button class="search-tab" data-kind="artists">Artists</button>
        </div>
        <div id="research-status" class="hidden"></div>
        <div id="browse-list"></div>
      </div>

      <!-- View 3: Playlist Detail -->
      <div id="view-detail" class="view-panel">
        <div id="detail-cover"><img id="detail-cover-img" src="" alt="" /></div>
        <div id="detail-subheader"></div>
        <div id="detail-tracks"></div>
      </div>

      <!-- View 4: Queue -->
      <div id="view-queue" class="view-panel">
        <div id="queue-subheader"></div>
        <div id="queue-tracks"></div>
      </div>

      <!-- View 5: Research Results -->
      <div id="view-research" class="view-panel">
        <div id="research-header">
          <input type="text" id="research-name" placeholder="Playlist name" autocomplete="off" spellcheck="false" />
        </div>
        <div id="research-tracks"></div>
        <div id="research-actions">
          <button id="research-create-btn" class="action-btn primary">Done</button>
          <button id="research-queue-btn" class="action-btn">Add All to Queue</button>
        </div>
      </div>

      <!-- View 6: History -->
      <div id="view-history" class="view-panel">
        <div id="history-subheader"></div>
        <div id="history-tracks"></div>
      </div>

    </div>

    <!-- Playlist picker overlay -->
    <div id="playlist-picker" class="hidden">
      <div id="playlist-picker-content">
        <div id="playlist-picker-title">Add to Playlist</div>
        <div id="playlist-picker-list"></div>
        <button id="playlist-picker-new" class="list-row">
          <div class="list-row-info">
            <div class="list-row-title">+ New Playlist...</div>
          </div>
        </button>
      </div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>

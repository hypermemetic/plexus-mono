<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mono Tray</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Disconnected overlay -->
    <div id="disconnect-overlay" class="hidden">
      <div class="disconnect-content">
        <div class="disconnect-icon">⚡</div>
        <div class="disconnect-text">Disconnected</div>
        <div class="disconnect-sub">Reconnecting...</div>
      </div>
    </div>

    <!-- Album art -->
    <div id="art-container">
      <img id="album-art" src="" alt="" />
      <div id="art-placeholder">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
    </div>

    <!-- Track info -->
    <div id="track-info">
      <div id="title">Not Playing</div>
      <div id="artist-album"></div>
    </div>

    <!-- Progress bar -->
    <div id="progress-container">
      <div id="progress-bar">
        <div id="progress-fill"></div>
        <div id="progress-thumb"></div>
      </div>
      <div id="time-display">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>

    <!-- Transport controls -->
    <div id="controls">
      <button id="btn-previous" class="control-btn" title="Previous">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
        </svg>
      </button>
      <button id="btn-play-pause" class="control-btn primary" title="Play/Pause">
        <svg id="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg id="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" class="hidden">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>
      <button id="btn-next" class="control-btn" title="Next">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
        </svg>
      </button>
    </div>

    <!-- Volume slider -->
    <div id="volume-container">
      <svg id="volume-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      </svg>
      <input type="range" id="volume-slider" min="0" max="100" value="100" />
    </div>

    <!-- Footer -->
    <div id="footer">
      <span id="queue-info"></span>
      <a id="open-link" href="#" title="Open on Monochrome">
        Open on Monochrome ↗
      </a>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
